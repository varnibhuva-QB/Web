version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PYTHONUNBUFFERED=1
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    networks:
      - leadgen

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - leadgen

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - leadgen

volumes:
  mongo_data:

networks:
  leadgen:
    driver: bridge
